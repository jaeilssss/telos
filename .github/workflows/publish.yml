name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade build twine
      - run: python scripts/check_release_versions.py "${{ github.event.release.tag_name }}"
      - run: python -m unittest discover -s tests -v
        env:
          PYTHONPATH: src
      - run: python -m build
      - run: python -m twine check dist/*
      - run: python scripts/check_wheel.py "$(find dist -name '*.whl' -print -quit)"
      - run: gh release upload "${{ github.event.release.tag_name }}" src/telos_kit/kit_versions.json --clobber
        env:
          GH_TOKEN: ${{ github.token }}
      - uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/telos-kit
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
